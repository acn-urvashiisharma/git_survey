name: Save Survey Response

on:
  issues:
    types: [opened]

jobs:
  save-and-close:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Label, comment and close survey issue
        if: contains(github.event.issue.title, '[Survey]')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SURVEY_TOKEN }}
          script: |
            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['survey-response']
            });

            // Thank you comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Thank you for completing the Developer Git Survey! Your response has been recorded.'
            });

            // Auto-close
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
